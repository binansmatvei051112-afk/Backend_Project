{% extends "base.html" %}
{% block title %}Вход - CryptoTracker{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);">
    <h2>Вход</h2>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form action="/login" method="post">
        <div style="margin-bottom: 15px;">
            <label>Логин:</label>
            <input type="text" name="username" required style="width: 100%; padding: 8px;">
        </div>
        <div style="margin-bottom: 15px; position: relative;">
            <label>Пароль:</label>
            <input type="password" name="password" id="password-input" required 
                style="width: 100%; padding: 8px; box-sizing: border-box;">
            <i class="fa-solid fa-eye" id="toggle-password" 
            style="position: absolute; right: 10px; top: 32px; cursor: pointer; color: #7f8c8d;"></i>
        </div>
        <button type="submit" style="background: #00b894; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px;">Войти</button>
    </form>
    <p style="margin-top: 15px;">Нет аккаунта? <a href="/signup_page">Зарегистрироваться</a></p>
</div>
{% endblock %}
